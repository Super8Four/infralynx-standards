name: Bug
description: Report a defect or regression.
title: "[Bug]: "
labels:
  - type:bug
body:
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - core
        - dcim
        - ipam
        - networking
        - virtualization
        - ui
        - api
        - db
        - ci-cd
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
